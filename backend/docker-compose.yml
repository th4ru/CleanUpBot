version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite:///system_manager.db
      - SSH_PORT=22
      - SSH_TIMEOUT=30
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    volumes:
      - ./:/app
      - ./system_manager.db:/app/system_manager.db
    networks:
      - system-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  system-network:
    driver: bridge
